<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>github || Home-Page</title>
    <link
      rel="shortcut icon"
      href="./assets/git_logo.webp"
      type="image/x-icon"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- using inline css  -->
    <style>
      * {
        font-family: 'Geist', sans-serif;
      }
      .active_btn {
        background-color: rgb(50, 235, 115);
        color: black;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <header class="w-11/12 mx-auto sticky top-0 z-50">
      <div class="navbar bg-base-100 shadow-sm">
        <div class="flex-1">
          <div class="flex items-center gap-3">
            <img class="w-10" src="./assets/github-logo.png" alt="" />
            <p class="text-[18px] font-semibold hidden lg:block md:block">
              GitHub Issues Tracker
            </p>
          </div>
        </div>
        <div>
          <div class="flex gap-2 relative">
            <input
              id="getDataUser"
              type="text"
              placeholder="Search"
              class="input input-bordered w-24 md:w-auto pl-12"
            />
            <span
              ><i
                class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 px-1 opacity-70"
              ></i
            ></span>
            <button id="newIssueBtn" type="button" class="btn btn-primary">
              + New Issue
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="w-11/12 mx-auto mt-10 shadow-xl rounded-2xl">
      <div class="p-6 bg-base-300 rounded-xl">
        <button id="allBtn" class="btn active_btn" type="button">All</button>
        <button id="openBtn" class="btn" type="button">Open</button>
        <button id="closedBtn" class="btn" type="button">Closed</button>
      </div>
    </main>
    <section
      class="w-11/12 mx-auto p-3 bg-base-300 my-4 rounded-2xl shadow-2xl"
    >
      <div class="mother rounded-2xl flex items-center justify-between p-1">
        <div class="flex gap-1 items-center vi">
          <img class="h-10" src="./assets/Aperture.png" alt="" />
          <div class="px-2">
            <span id="countCard" class="text-xl font-bold">0 </span>
            <span class="text-xl">I</span>
            <p class="text-[#332929a4]">Track and manage your project issues</p>
          </div>
        </div>
        <div class="">
          <span
            ><i class="fa-regular fa-circle-dot text-green-700"></i> Open</span
          >
          <span
            ><i class="fa-regular fa-circle-dot text-red-500"></i> Closed</span
          >
        </div>
      </div>
    </section>
    <section
      id="main_container"
      class="w-11/12 mx-auto my-6 rounded-xl shadow-xl p-10 space-y-8 grid grid-cols-1 bg-base-300 gap-4 md:grid-cols-2 lg:grid-cols-4"
    ></section>
    <!-- Open the modal using ID.showModal() method -->
    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div id="main_containers" class="space-y-6"></div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>
    <script src="home.js"></script>
  </body>
</html>
